<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Señas & Letras</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Nunito:wght@400;600;700;800;900&display=swap');
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body { font-family: Nunito, sans-serif; background: linear-gradient(135deg,#1a1a2e,#16213e,#0f3460); min-height:100vh; color:#fff; overflow-x:hidden; }
  .game-header { text-align:center; padding:18px 16px 8px; }
  .game-title { font-size:26px; font-weight:900; background:linear-gradient(90deg,#f7971e,#ffd200); -webkit-background-clip:text; -webkit-text-fill-color:transparent; }
  .game-subtitle { font-size:12px; color:#a0b4cc; margin-top:3px; }
  .stats-bar { display:flex; justify-content:center; gap:10px; padding:10px 16px; flex-wrap:wrap; }
  .stat-pill { background:rgba(255,255,255,0.08); border:1px solid rgba(255,255,255,0.12); border-radius:20px; padding:5px 12px; font-size:12px; font-weight:700; display:flex; align-items:center; gap:5px; }
  .stat-pill span.val { color:#ffd200; }
  .difficulty-selector { display:flex; justify-content:center; gap:8px; padding:6px 16px 10px; }
  .diff-btn { background:rgba(255,255,255,0.07); border:1.5px solid rgba(255,255,255,0.15); border-radius:20px; color:#c0cfe0; font-family:Nunito,sans-serif; font-size:12px; font-weight:700; padding:5px 12px; cursor:pointer; transition:all 0.2s; }
  .diff-btn.active, .diff-btn:hover { background:rgba(247,151,30,0.25); border-color:#f7971e; color:#ffd200; }
  .progress-bar-wrap { padding:0 20px 6px; }
  .progress-bar { background:rgba(255,255,255,0.1); border-radius:6px; height:7px; overflow:hidden; }
  .progress-fill { height:100%; background:linear-gradient(90deg,#f7971e,#ffd200); border-radius:6px; transition:width 0.4s; width:0%; }
  .action-row { display:flex; justify-content:center; gap:10px; padding:8px 16px 4px; flex-wrap:wrap; }
  .btn { font-family:Nunito,sans-serif; font-weight:700; font-size:12px; border-radius:20px; border:none; padding:7px 16px; cursor:pointer; transition:all 0.18s; }
  .btn-hint { background:rgba(100,180,255,0.15); border:1.5px solid #64b4ff; color:#64b4ff; }
  .btn-hint:hover { background:rgba(100,180,255,0.28); }
  .btn-reset { background:rgba(255,255,255,0.09); border:1.5px solid rgba(255,255,255,0.2); color:#c0cfe0; }
  .btn-reset:hover { background:rgba(255,255,255,0.15); }
  .hint-cost { font-size:10px; opacity:0.75; }
  .game-area { position:relative; display:flex; justify-content:space-between; align-items:flex-start; padding:6px 10px; gap:6px; }
  .column { display:flex; flex-direction:column; gap:5px; width:110px; flex-shrink:0; }
  .card { background:rgba(255,255,255,0.06); border:1.5px solid rgba(255,255,255,0.13); border-radius:12px; padding:6px 8px; cursor:pointer; transition:all 0.18s; user-select:none; min-height:60px; max-height:60px; display:flex; align-items:center; justify-content:center; font-size:22px; font-weight:900; color:#e8f0fe; }
  .card:hover:not(.matched):not(.disabled) { background:rgba(247,151,30,0.18); border-color:#f7971e; transform:scale(1.04); }
  .card.selected { background:rgba(247,151,30,0.28); border-color:#ffd200; box-shadow:0 0 12px rgba(255,210,0,0.3); transform:scale(1.05); }
  .card.matched { background:rgba(34,197,94,0.2); border-color:#22c55e; color:#86efac; cursor:default; }
  .card.wrong { background:rgba(239,68,68,0.22); border-color:#ef4444; animation:shake 0.35s ease; }
  @keyframes shake { 0%,100%{transform:translateX(0)} 20%{transform:translateX(-5px)} 40%{transform:translateX(5px)} 60%{transform:translateX(-4px)} 80%{transform:translateX(4px)} }
  .card.disabled { opacity:0.4; cursor:default; }
  .sign-card { background:rgba(255,255,255,0.06); border:1.5px solid rgba(255,255,255,0.13); border-radius:12px; padding:3px; cursor:pointer; transition:all 0.18s; user-select:none; min-height:60px; max-height:60px; display:flex; align-items:center; justify-content:center; overflow:hidden; }
  .sign-card img { width:54px; height:54px; object-fit:cover; border-radius:8px; display:block; }
  .sign-card:hover:not(.matched):not(.disabled) { background:rgba(100,180,255,0.18); border-color:#64b4ff; transform:scale(1.04); }
  .sign-card.selected { background:rgba(100,180,255,0.28); border-color:#64b4ff; box-shadow:0 0 12px rgba(100,180,255,0.3); transform:scale(1.05); }
  .sign-card.matched { background:rgba(34,197,94,0.2); border-color:#22c55e; cursor:default; }
  .sign-card.wrong { background:rgba(239,68,68,0.22); border-color:#ef4444; animation:shake 0.35s ease; }
  .sign-card.disabled { opacity:0.4; cursor:default; }
  .svg-center { position:relative; flex:1; align-self:stretch; min-height:300px; }
  #connection-svg { position:absolute; top:0; left:0; width:100%; height:100%; pointer-events:none; overflow:visible; }
  .hint-overlay { display:none; position:fixed; top:0; left:0; right:0; bottom:0; background:rgba(0,0,0,0.65); z-index:100; align-items:center; justify-content:center; }
  .hint-overlay.active { display:flex; }
  .hint-modal { background:#1a2744; border:2px solid #f7971e; border-radius:20px; padding:22px 18px 18px; max-width:360px; width:92%; text-align:center; max-height:90vh; overflow-y:auto; }
  .hint-modal h3 { font-size:16px; font-weight:800; color:#ffd200; margin-bottom:8px; }
  .hint-modal p { font-size:12px; color:#a0b4cc; margin-bottom:12px; }
  .hint-letters-grid { display:flex; flex-wrap:wrap; gap:7px; justify-content:center; margin-bottom:12px; }
  .hint-letter-btn { background:rgba(255,255,255,0.07); border:1.5px solid rgba(255,255,255,0.18); border-radius:10px; color:#e8f0fe; font-family:Nunito,sans-serif; font-weight:800; font-size:17px; padding:7px 12px; cursor:pointer; transition:all 0.15s; min-width:42px; }
  .hint-letter-btn:hover { background:rgba(247,151,30,0.28); border-color:#f7971e; color:#ffd200; }
  .btn-cancel-hint { background:rgba(255,255,255,0.07); border:1.5px solid rgba(255,255,255,0.18); border-radius:12px; color:#a0b4cc; font-family:Nunito,sans-serif; font-weight:700; font-size:12px; padding:7px 18px; cursor:pointer; }
  .hint-preview { background:rgba(255,255,255,0.06); border-radius:14px; padding:14px; margin-bottom:12px; display:flex; align-items:center; justify-content:center; gap:16px; }
  .hint-preview-letter { font-size:52px; font-weight:900; color:#ffd200; line-height:1; }
  .hint-preview img { width:90px; height:90px; object-fit:cover; border-radius:12px; }
  .btn-use-hint { background:linear-gradient(90deg,#f7971e,#ffd200); border:none; border-radius:12px; color:#1a1a2e; font-family:Nunito,sans-serif; font-weight:800; font-size:13px; padding:9px 20px; cursor:pointer; margin-bottom:8px; display:block; width:100%; }
  .result-overlay { display:none; position:fixed; top:0; left:0; right:0; bottom:0; background:rgba(0,0,0,0.7); z-index:200; align-items:center; justify-content:center; }
  .result-overlay.active { display:flex; }
  .result-modal { background:#1a2744; border:2px solid #ffd200; border-radius:24px; padding:28px 22px; max-width:310px; width:90%; text-align:center; }
  .result-title { font-size:26px; font-weight:900; color:#ffd200; margin-bottom:5px; }
  .result-stars { font-size:30px; margin-bottom:10px; letter-spacing:4px; }
  .result-score { font-size:17px; font-weight:700; color:#e8f0fe; margin-bottom:5px; }
  .result-detail { font-size:12px; color:#a0b4cc; margin-bottom:16px; }
  .btn-play-again { background:linear-gradient(90deg,#f7971e,#ffd200); border:none; border-radius:12px; color:#1a1a2e; font-family:Nunito,sans-serif; font-weight:800; font-size:14px; padding:10px 24px; cursor:pointer; width:100%; }
  .timer-warning { color:#ef4444 !important; animation:pulse 0.8s ease infinite; }
  @keyframes pulse { 0%,100%{opacity:1} 50%{opacity:0.5} }
  .confetti-piece { position:fixed; width:10px; height:10px; border-radius:2px; pointer-events:none; z-index:999; animation:confettiFall 1.8s ease forwards; }
  @keyframes confettiFall { 0%{transform:translateY(-20px) rotate(0deg);opacity:1} 100%{transform:translateY(100vh) rotate(720deg);opacity:0} }
</style>
</head>
<body>

<div class="game-header">
  <div class="game-title">✋ Señas & Letras</div>
  <div class="game-subtitle">Une cada letra con su seña correcta en Lengua de Señas</div>
</div>

<div class="difficulty-selector">
  <button class="diff-btn active" onclick="setDifficulty('easy')">Fácil (8)</button>
  <button class="diff-btn" onclick="setDifficulty('medium')">Medio (14)</button>
  <button class="diff-btn" onclick="setDifficulty('hard')">Difícil (27)</button>
</div>

<div class="stats-bar">
  <div class="stat-pill">⏱ <span class="val" id="timer-display">90s</span></div>
  <div class="stat-pill">⭐ <span class="val" id="score-display">0</span></div>
  <div class="stat-pill">❌ <span class="val" id="errors-display">0</span></div>
  <div class="stat-pill">✅ <span class="val" id="progress-display">0/8</span></div>
</div>

<div class="progress-bar-wrap">
  <div class="progress-bar"><div class="progress-fill" id="progress-fill"></div></div>
</div>

<div class="action-row">
  <button class="btn btn-hint" onclick="openHintModal()">💡 Usar pista <span class="hint-cost">(-10 pts)</span></button>
  <button class="btn btn-reset" onclick="resetGame()">🔄 Nueva partida</button>
</div>

<div class="game-area">
  <div class="column" id="letters-col"></div>
  <div class="svg-center" id="svg-center">
    <svg id="connection-svg"></svg>
  </div>
  <div class="column" id="signs-col"></div>
</div>

<div class="hint-overlay" id="hint-overlay">
  <div class="hint-modal">
    <h3>💡 Usar Pista</h3>
    <div id="hint-step1">
      <p>Selecciona la letra que quieres ver:</p>
      <div class="hint-letters-grid" id="hint-letters-grid"></div>
      <button class="btn-cancel-hint" onclick="closeHintModal()">Cancelar</button>
    </div>
    <div id="hint-step2" style="display:none">
      <div class="hint-preview" id="hint-preview"></div>
      <button class="btn-use-hint" id="btn-use-hint">✅ Usar esta pista (-10 pts)</button>
      <button class="btn-cancel-hint" onclick="backToStep1()">← Elegir otra letra</button>
    </div>
  </div>
</div>

<div class="result-overlay" id="result-overlay">
  <div class="result-modal">
    <div class="result-title" id="result-title">¡Completado!</div>
    <div class="result-stars" id="result-stars">⭐⭐⭐</div>
    <div class="result-score" id="result-score">Puntuación: 0</div>
    <div class="result-detail" id="result-detail"></div>
    <button class="btn-play-again" onclick="resetGame();document.getElementById('result-overlay').classList.remove('active')">🔄 Jugar de nuevo</button>
  </div>
</div>

};

const ALL_LETTERS = Object.keys(SIGN_IMAGES);
const DIFFICULTIES = { easy:{count:8,time:90}, medium:{count:14,time:60}, hard:{count:27,time:120} };

let difficulty='easy', gameLetters=[], leftOrder=[], rightOrder=[], selectedLeft=null, selectedRight=null;
let matched={}, errors=0, score=0, timerInterval=null, timeLeft=90, gameActive=false;

function shuffle(arr){ const a=[...arr]; for(let i=a.length-1;i>0;i--){const j=Math.floor(Math.random()*(i+1));[a[i],a[j]]=[a[j],a[i]];} return a; }

function setDifficulty(d){
  difficulty=d;
  document.querySelectorAll('.diff-btn').forEach((b,i)=>b.classList.toggle('active',['easy','medium','hard'][i]===d));
  resetGame();
}

function resetGame(){
  clearInterval(timerInterval);
  const {count,time}=DIFFICULTIES[difficulty];
  gameLetters=shuffle([...ALL_LETTERS]).slice(0,count);
  leftOrder=shuffle([...gameLetters]);
  rightOrder=shuffle([...gameLetters]);
  matched={}; errors=0; score=0; selectedLeft=null; selectedRight=null; timeLeft=time; gameActive=true;
  updateStats(); renderCards(); clearLines(); startTimer();
  document.getElementById('result-overlay').classList.remove('active');
}

function startTimer(){
  clearInterval(timerInterval);
  updateTimerDisplay();
  timerInterval=setInterval(()=>{
    timeLeft--;
    updateTimerDisplay();
    if(timeLeft<=0){ clearInterval(timerInterval); gameActive=false; showResult(false); }
  },1000);
}

function updateTimerDisplay(){
  const el=document.getElementById('timer-display');
  el.textContent=timeLeft+'s';
  el.className=timeLeft<=10?'val timer-warning':'val';
}

function updateStats(){
  document.getElementById('score-display').textContent=score;
  document.getElementById('errors-display').textContent=errors;
  const done=Object.keys(matched).length, total=gameLetters.length;
  document.getElementById('progress-display').textContent=done+'/'+total;
  document.getElementById('progress-fill').style.width=(done/total*100)+'%';
}

function renderCards(){
  const lCol=document.getElementById('letters-col');
  const rCol=document.getElementById('signs-col');
  lCol.innerHTML=''; rCol.innerHTML='';
  leftOrder.forEach(letter=>{
    const card=document.createElement('div');
    card.className='card'; card.dataset.letter=letter; card.id='left-'+letter;
    card.textContent=letter;
    card.onclick=()=>selectLeft(letter);
    lCol.appendChild(card);
  });
  rightOrder.forEach(letter=>{
    const card=document.createElement('div');
    card.className='sign-card'; card.dataset.letter=letter; card.id='right-'+letter;
    const img=document.createElement('img');
    img.src=SIGN_IMAGES[letter];
    img.alt='Seña '+letter;
    card.appendChild(img);
    card.onclick=()=>selectRight(letter);
    rCol.appendChild(card);
  });
}

function selectLeft(letter){
  if(!gameActive||matched[letter]) return;
  if(selectedLeft===letter){ document.getElementById('left-'+letter).classList.remove('selected'); selectedLeft=null; return; }
  if(selectedLeft) document.getElementById('left-'+selectedLeft).classList.remove('selected');
  selectedLeft=letter;
  document.getElementById('left-'+letter).classList.add('selected');
  if(selectedRight) tryMatch();
}

function selectRight(letter){
  if(!gameActive||matched[letter]) return;
  if(selectedRight===letter){ document.getElementById('right-'+letter).classList.remove('selected'); selectedRight=null; return; }
  if(selectedRight) document.getElementById('right-'+selectedRight).classList.remove('selected');
  selectedRight=letter;
  document.getElementById('right-'+letter).classList.add('selected');
  if(selectedLeft) tryMatch();
}

function tryMatch(){
  const lCard=document.getElementById('left-'+selectedLeft);
  const rCard=document.getElementById('right-'+selectedRight);
  if(selectedLeft===selectedRight){
    lCard.classList.remove('selected'); lCard.classList.add('matched');
    rCard.classList.remove('selected'); rCard.classList.add('matched');
    matched[selectedLeft]=true; score+=20;
    drawLine(selectedLeft,true);
    selectedLeft=null; selectedRight=null;
    updateStats();
    if(Object.keys(matched).length===gameLetters.length){
      clearInterval(timerInterval); gameActive=false;
      setTimeout(()=>showResult(true),500);
      launchConfetti();
    }
  } else {
    lCard.classList.remove('selected'); lCard.classList.add('wrong');
    rCard.classList.remove('selected'); rCard.classList.add('wrong');
    errors++; score=Math.max(0,score-5); updateStats();
    setTimeout(()=>{ lCard.classList.remove('wrong'); rCard.classList.remove('wrong'); },400);
    selectedLeft=null; selectedRight=null;
  }
}

function getCardCenter(el){
  const area=document.getElementById('svg-center');
  const areaRect=area.getBoundingClientRect();
  const rect=el.getBoundingClientRect();
  return { x:rect.left+rect.width/2-areaRect.left, y:rect.top+rect.height/2-areaRect.top };
}

function drawLine(letter,correct){
  const lCard=document.getElementById('left-'+letter);
  const rCard=document.getElementById('right-'+letter);
  if(!lCard||!rCard) return;
  const svg=document.getElementById('connection-svg');
  const lPos=getCardCenter(lCard), rPos=getCardCenter(rCard);
  const line=document.createElementNS('http://www.w3.org/2000/svg','line');
  line.setAttribute('x1',lPos.x); line.setAttribute('y1',lPos.y);
  line.setAttribute('x2',rPos.x); line.setAttribute('y2',rPos.y);
  line.setAttribute('stroke',correct?'#22c55e':'#ef4444');
  line.setAttribute('stroke-width','2.5');
  line.setAttribute('stroke-dasharray','6,3');
  line.setAttribute('opacity','0.75');
  svg.appendChild(line);
}

function clearLines(){ document.getElementById('connection-svg').innerHTML=''; }

function showResult(won){
  const done=Object.keys(matched).length, total=gameLetters.length;
  let stars=errors===0?'⭐⭐⭐':errors<=3?'⭐⭐':'⭐';
  document.getElementById('result-title').textContent=won?'¡Completado! 🎉':'⏰ ¡Tiempo!';
  document.getElementById('result-stars').textContent=stars;
  document.getElementById('result-score').textContent='Puntuación: '+score;
  document.getElementById('result-detail').textContent='Conectaste '+done+' de '+total+' letras con '+errors+' error'+(errors!==1?'es':'')+ '.';
  document.getElementById('result-overlay').classList.add('active');
}

function launchConfetti(){
  const colors=['#ffd200','#f7971e','#22c55e','#64b4ff','#f472b6'];
  for(let i=0;i<40;i++) setTimeout(()=>{
    const p=document.createElement('div'); p.className='confetti-piece';
    p.style.left=Math.random()*100+'vw'; p.style.top='-10px';
    p.style.background=colors[Math.floor(Math.random()*colors.length)];
    p.style.transform='rotate('+Math.random()*360+'deg)';
    p.style.animationDuration=(1.2+Math.random()*0.8)+'s';
    document.body.appendChild(p); setTimeout(()=>p.remove(),2500);
  },i*40);
}

function openHintModal(){
  if(!gameActive) return;
  const grid=document.getElementById('hint-letters-grid');
  grid.innerHTML='';
  const unmatched=gameLetters.filter(l=>!matched[l]);
  if(!unmatched.length) return;
  unmatched.forEach(letter=>{
    const btn=document.createElement('button');
    btn.className='hint-letter-btn'; btn.textContent=letter;
    btn.onclick=()=>showHintPreview(letter);
    grid.appendChild(btn);
  });
  document.getElementById('hint-step1').style.display='';
  document.getElementById('hint-step2').style.display='none';
  document.getElementById('hint-overlay').classList.add('active');
}

function showHintPreview(letter){
  const preview=document.getElementById('hint-preview');
  preview.innerHTML='<div class="hint-preview-letter">'+letter+'</div><div style="color:#a0b4cc;font-size:20px;">→</div><img src="'+SIGN_IMAGES[letter]+'" alt="Seña '+letter+'">';
  document.getElementById('hint-step1').style.display='none';
  document.getElementById('hint-step2').style.display='';
  document.getElementById('btn-use-hint').onclick=()=>applyHint(letter);
}

function backToStep1(){
  document.getElementById('hint-step1').style.display='';
  document.getElementById('hint-step2').style.display='none';
}

function applyHint(letter){
  score=Math.max(0,score-10); updateStats(); closeHintModal();
  const lCard=document.getElementById('left-'+letter);
  const rCard=document.getElementById('right-'+letter);
  if(lCard){ lCard.classList.remove('selected','wrong'); lCard.classList.add('matched'); }
  if(rCard){ rCard.classList.remove('selected','wrong'); rCard.classList.add('matched'); }
  matched[letter]=true;
  drawLine(letter,true); updateStats();
  if(selectedLeft===letter) selectedLeft=null;
  if(selectedRight===letter) selectedRight=null;
  if(Object.keys(matched).length===gameLetters.length){
    clearInterval(timerInterval); gameActive=false;
    setTimeout(()=>showResult(true),400);
  }
}

function closeHintModal(){ document.getElementById('hint-overlay').classList.remove('active'); }

resetGame();
</script>
